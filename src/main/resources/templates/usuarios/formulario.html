<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Codechella | ' + ${pageTitle}">Codechella</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page-shell">
    <div class="container-lg">
        <section class="hero-card compact-hero p-4 p-lg-5 mb-4">
            <div class="brand-kicker mb-3">Fluxo de formulario</div>
            <h1 class="display-title small-title" th:text="${pageTitle}">Cadastrar usuario</h1>
            <p class="lead-copy mb-0" th:text="${pageDescription}">Preencha os campos para continuar.</p>
        </section>

        <section class="form-panel wide-panel">
            <div class="form-header">
                <div>
                    <h2 th:text="${pageTitle}">Cadastrar usuario</h2>
                    <p class="section-copy mb-0">Campos obrigatorios com validacao e retorno rapido para a listagem.</p>
                </div>
                <span class="badge-soft" th:text="${editando} ? 'Edicao' : 'Cadastro'">Cadastro</span>
            </div>

            <form th:action="${formAction}" th:object="${form}" method="post" novalidate>
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome completo</label>
                    <input id="nome" type="text" class="form-control" th:field="*{nome}" placeholder="Ex.: Ana Silva">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="cpf" class="form-label">CPF</label>
                        <input id="cpf" type="text" class="form-control" th:field="*{cpf}" placeholder="000.000.000-00">
                        <div class="field-help mt-2">Use o mesmo padrao validado pelo dominio.</div>
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></div>
                    </div>
                    <div class="col-md-6">
                        <label for="nascimento" class="form-label">Nascimento</label>
                        <input id="nascimento" type="date" class="form-control" th:field="*{nascimento}">
                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('nascimento')}" th:errors="*{nascimento}"></div>
                    </div>
                </div>

                <div class="mt-3">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" type="email" class="form-control" th:field="*{email}" placeholder="nome@dominio.com">
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-accent" th:text="${submitLabel}">Salvar usuario</button>
                    <a th:href="@{/usuarios}" class="btn btn-ghost">Cancelar</a>
                </div>
            </form>
        </section>
    </div>
</main>
</body>
</html>
